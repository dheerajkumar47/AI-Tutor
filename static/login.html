<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — AI Tutor</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">AI <span>Tutor</span></a>
    <div class="nav-links">
      <a href="/register">Sign up</a>
      <a href="/">Home</a>
    </div>
  </nav>
  <div class="container" style="padding-top:2rem">
    <div class="card">
      <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">Welcome back</h2>
      <p style="color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem;">Log in to your account to continue your learning.</p>
      
      <form id="form">
        <div class="input-field-wrap">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" placeholder="name@company.com" required />
        </div>

        <div class="input-field-wrap">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          <button type="button" class="eye-toggle" onclick="togglePass()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <div id="err" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary animate-glide" style="width:100%; margin-top: 0.5rem;">Continue</button>
      </form>
      <p class="status" style="margin-top:1.5rem; text-align:center">
        No account? <a href="/register">Sign up</a>
      </p>
    </div>
  </div>
  <script src="/static/js/auth.js"></script>
  <script>
    function togglePass() {
      const el = document.getElementById('password');
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    if (AITutorAuth.getToken()) window.location.href = "/dashboard";
    document.getElementById("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      var err = document.getElementById("err");
      err.style.display = "none";
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      try {
        var res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, password: password }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          err.textContent = AITutorAuth.formatApiError(data, res.statusText);
          err.style.display = "block";
          return;
        }
        AITutorAuth.setToken(data.access_token);
        window.location.href = "/dashboard";
      } catch (x) {
        err.textContent = x.message || String(x);
        err.style.display = "block";
      }
    });
  </script>
</body>
</html>
