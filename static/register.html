<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — AI Tutor</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">AI <span>Tutor</span></a>
    <div class="nav-links">
      <a href="/login">Log in</a>
      <a href="/">Home</a>
    </div>
  </nav>
  <div class="container" style="padding-top:2rem">
    <div class="card">
      <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">Create account</h2>
      <p style="color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem;">Join AI Tutor to start your learning journey.</p>
      
      <form id="form">
        <div class="input-field-wrap">
          <label for="fullname">Full Name</label>
          <input id="fullname" type="text" placeholder="John Doe" required />
        </div>

        <div class="input-field-wrap">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" placeholder="name@company.com" required />
        </div>

        <div class="input-field-wrap">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="new-password" minlength="8" placeholder="••••••••" required />
          <button type="button" class="eye-toggle" onclick="togglePass('password')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <div class="input-field-wrap">
          <label for="confirm_password">Verify Password</label>
          <input id="confirm_password" type="password" autocomplete="new-password" placeholder="••••••••" required />
          <button type="button" class="eye-toggle" onclick="togglePass('confirm_password')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <div id="err" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary animate-glide" style="width:100%; margin-top: 0.5rem;">Sign up</button>
      </form>
      <p class="status" style="margin-top:1.5rem; text-align:center">
        Already have an account? <a href="/login">Log in</a>
      </p>
    </div>
  </div>
  <script src="/static/js/auth.js"></script>
  <script>
    function togglePass(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    if (AITutorAuth.getToken()) window.location.href = "/dashboard";
    
    document.getElementById("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      var err = document.getElementById("err");
      err.style.display = "none";
      
      var fullname = document.getElementById("fullname").value.trim();
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      var confirm = document.getElementById("confirm_password").value;

      if (password !== confirm) {
        err.textContent = "Passwords do not match.";
        err.style.display = "block";
        return;
      }

      if (password.length < 8) {
        err.textContent = "Password must be at least 8 characters.";
        err.style.display = "block";
        return;
      }

      try {
        var res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, password: password, full_name: fullname }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          err.textContent = AITutorAuth.formatApiError(data, res.statusText);
          err.style.display = "block";
          return;
        }
        AITutorAuth.setToken(data.access_token);
        window.location.href = "/dashboard";
      } catch (x) {
        err.textContent = x.message || String(x);
        err.style.display = "block";
      }
    });
  </script>
</body>
</html>
